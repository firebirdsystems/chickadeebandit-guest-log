<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--hub-bg, #f9fafb);
      --surface: var(--hub-surface, #ffffff);
      --border: var(--hub-border, #e5e7eb);
      --border-mid: var(--hub-border, #d1d5db);
      --text: var(--hub-text, #000000);
      --muted: var(--hub-text-muted, #6b7280);
      --accent: var(--hub-primary, #111827);
      --accent-hover: var(--hub-primary-hover, #374151);
      --accent-fg: var(--hub-primary-fg, #ffffff);
      --radius: var(--hub-radius, 8px);
      --green: #047857;
      --green-soft: #d1fae5;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --red: #b91c1c;
      --red-soft: #fee2e2;
      --blue-soft: #dbeafe;
      --shadow: 0 1px 3px rgba(15, 23, 42, .07);
    }
    body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: var(--hub-font-size, 15px); line-height: 1.5;
    }
    .app { max-width: 760px; margin: 0 auto; padding: 16px; }
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    h1 { font-size: 1.35rem; line-height: 1.2; }
    h2 { font-size: 1rem; margin-bottom: 10px; }
    h3 { font-size: 1.05rem; margin-bottom: 12px; }
    .muted { color: var(--muted); }
    .tiny { font-size: .78rem; }
    .stack { display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px;
    }
    .visit-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .guest-name { font-weight: 750; font-size: 1.02rem; }
    .visit-meta { margin-top: 2px; color: var(--muted); font-size: .82rem; }
    .pill {
      display: inline-flex; align-items: center; justify-content: center; min-height: 22px;
      padding: 2px 9px; border-radius: 999px; background: #f1f5f9; color: var(--muted);
      font-size: .72rem; font-weight: 700; white-space: nowrap;
    }
    .pill.good { background: var(--green-soft); color: var(--green); }
    .pill.warn { background: var(--amber-soft); color: var(--amber); }
    .pill.bad  { background: var(--red-soft); color: var(--red); }
    .pill.info { background: var(--blue-soft); color: #1d4ed8; }
    .tabs { display: flex; gap: 4px; background: var(--border); padding: 3px; border-radius: 10px; margin-bottom: 14px; }
    .tab { flex: 1; border: 0; border-radius: 8px; background: transparent; color: var(--muted); padding: 7px; font-weight: 700; cursor: pointer; }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: 1px solid transparent; border-radius: 8px; padding: 8px 12px;
      font: inherit; font-size: .86rem; font-weight: 700; cursor: pointer;
      min-height: 38px; background: var(--accent); color: var(--accent-fg);
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .48; cursor: default; }
    .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-mid); }
    .btn-ghost:hover { background: #f8fafc; }
    .btn-danger { background: var(--red-soft); color: var(--red); border-color: transparent; }
    .btn-danger:hover { background: #fecaca; }
    .btn-good { background: var(--green-soft); color: var(--green); border-color: transparent; }
    .btn-good:hover { background: #a7f3d0; }
    .btn-sm { min-height: 31px; padding: 5px 9px; font-size: .78rem; }
    .field { display: grid; gap: 4px; }
    label { font-size: .76rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 800; }
    input, select, textarea {
      width: 100%; border: 1.5px solid var(--border-mid); border-radius: 8px;
      padding: 9px 11px; font: inherit; background: var(--surface); color: var(--text);
    }
    textarea { min-height: 60px; resize: vertical; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .empty, .loading { color: var(--muted); text-align: center; padding: 32px 16px; }
    .error { background: var(--red-soft); color: var(--red); padding: 9px 12px; border-radius: 8px; margin-bottom: 10px; font-size: .86rem; }
    .notice { background: var(--amber-soft); color: var(--amber); padding: 9px 12px; border-radius: 8px; margin-bottom: 10px; font-size: .86rem; }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 6px 2px 10px; }
    .section-head h2 { margin-bottom: 0; }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15, 23, 42, .45);
      display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50;
    }
    .modal {
      background: var(--surface); border-radius: 12px; padding: 18px; width: 100%;
      max-width: 440px; box-shadow: 0 20px 40px rgba(15, 23, 42, .25); max-height: 90vh; overflow-y: auto;
    }
    .modal .field { margin-bottom: 12px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    @media (max-width: 520px) {
      .visit-head { flex-direction: column; align-items: stretch; }
    }
  </style>
  <base href="/run/guest-log/">
</head>
<body>
<div class="app">
  <div id="root" class="loading">Loading…</div>
</div>

<script type="module">
import { esc, memberColor, initial, hubConfirm } from "/hub-sdk.js";
import {
  VISIT_TYPES, visitTypeMeta, isLeadership as _isLeadership,
  latestApproval, approvalState, isOnSite, canManageVisit as _canManageVisit,
} from "./logic.js";

const CONTEXT          = window.__CONTEXT_URL       ?? "";
const DB               = window.__DB_URL            ?? "";
const ADMIN_CONFIG_URL = window.__ADMIN_CONFIG_URL  ?? "";
const APP_ID           = window.__APP_ID            ?? "guest-log";
const APPEND_RECORD    = window.__APPEND_RECORD_URL ?? `/run/${APP_ID}/api/append-record`;
const ME       = window.__CURRENT_MEMBER ?? null;
const IS_ADMIN = !!window.__IS_ADMIN;

let members = [];
let memberMap = new Map();
let groups = [];
let settings = { leadership_group_id: null };
let visits = [];
let approvals = [];
let tab = "onsite";
let error = "";
let notice = "";
let modalEl = null;

const nowIso = () => new Date().toISOString();
const uid = (p) => `${p}-${crypto.randomUUID()}`;

function isLeadership() { return _isLeadership(ME, groups, settings.leadership_group_id); }
function leadershipConfigured() { return !!settings.leadership_group_id && !!groups.find(g => g.id === settings.leadership_group_id); }
function canManageVisit(v) { return _canManageVisit(v, ME, groups, settings.leadership_group_id); }

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function appendRecord(name, data) {
  const res = await fetch(`${APPEND_RECORD}/${encodeURIComponent(name)}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data),
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok || json.error) throw new Error(json.error || "Append failed");
  return json;
}

async function saveSetting(key, value) {
  const res = await fetch(ADMIN_CONFIG_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ key, value }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error ?? "Save failed");
  }
}

// ── Loading ───────────────────────────────────────────────────────────────────

async function loadContext() {
  if (!CONTEXT) {
    members = [
      { id: "demo-1", name: "Alex",   role: "adult" },
      { id: "demo-2", name: "Jordan", role: "adult" },
      { id: "demo-3", name: "Sam",    role: "adult" },
    ];
    groups = [{ id: "leaders", name: "House Leadership", memberIds: ["demo-1"] }];
    memberMap = new Map(members.map(m => [m.id, m]));
    return;
  }
  try {
    const res = await fetch(`${CONTEXT}?keys=family.members,family.groups`);
    const data = await res.json();
    members = data["family.members"] ?? [];
    groups  = data["family.groups"]  ?? [];
  } catch { members = []; groups = []; }
  memberMap = new Map(members.map(m => [m.id, m]));
}

async function loadSettings() {
  if (!DB) { settings = { leadership_group_id: "leaders" }; return; }
  try {
    const { rows } = await db(`SELECT key, value FROM app_guest_log__settings WHERE key = 'leadership_group_id'`);
    for (const r of rows) if (r.key === "leadership_group_id") settings.leadership_group_id = r.value || null;
  } catch { /* leave defaults */ }
}

async function loadData() {
  if (!DB) { seedDemo(); return; }
  // Row policies scope `visits` to the caller (own rows, or all for leadership).
  const [visitRows, approvalRows] = await Promise.all([
    db(`SELECT * FROM app_guest_log__visits ORDER BY check_in_at DESC LIMIT 500`),
    db(`SELECT * FROM app_guest_log__approvals ORDER BY decided_at ASC`),
  ]);
  visits = visitRows.rows;
  approvals = approvalRows.rows;
}

function seedDemo() {
  visits = [
    { id: "v1", guest_name: "The Patels", visit_type: "visitor",   purpose: "Study group", host_id: "demo-2", host_name: "Jordan", status: "checked_in",  check_in_at: nowIso(), check_out_at: null, expected_out_at: null, created_at: nowIso() },
    { id: "v2", guest_name: "Amazon",     visit_type: "delivery",  purpose: "Package drop", host_id: "demo-3", host_name: "Sam",    status: "checked_out", check_in_at: nowIso(), check_out_at: nowIso(), expected_out_at: null, created_at: nowIso() },
    { id: "v3", guest_name: "Grandma Lee", visit_type: "overnight", purpose: "Weekend stay", host_id: "demo-2", host_name: "Jordan", status: "checked_in", check_in_at: nowIso(), check_out_at: null, expected_out_at: "2026-07-09", created_at: nowIso() },
  ];
  approvals = [{ id: "a1", visit_id: "v3", decision: "approved", note: "Welcome!", decided_by: "demo-1", decided_at: nowIso() }];
}

async function refresh() {
  clearMessages();
  try {
    await Promise.all([loadContext(), loadSettings()]);
    await loadData();
    render();
  } catch (e) { error = e.message; render(); }
}

function clearMessages() { error = ""; notice = ""; }
function showError(m) { error = m; notice = ""; render(); }
function showNotice(m) { notice = m; error = ""; render(); }

// ── Visit actions ───────────────────────────────────────────────────────────────

async function submitVisitForm(form) {
  if (!ME) return;
  const guest_name = form.guest_name.value.trim();
  const visit_type = form.visit_type.value;
  const purpose = form.purpose.value.trim();
  const expected_out_at = form.expected_out_at.value || null;
  if (!guest_name) { form.guest_name.focus(); return; }
  const visit = {
    id: uid("visit"), guest_name, visit_type, purpose,
    host_id: ME.id, host_name: ME.name ?? "", status: "checked_in",
    check_in_at: nowIso(), check_out_at: null,
    expected_out_at: visit_type === "overnight" ? expected_out_at : null,
    created_at: nowIso(), updated_at: nowIso(),
  };
  try {
    if (DB) {
      await db(
        `INSERT INTO app_guest_log__visits
          (id, guest_name, visit_type, purpose, host_id, host_name, status, check_in_at, check_out_at, expected_out_at, created_at, updated_at)
         VALUES (?, ?, ?, ?, ?, ?, 'checked_in', ?, NULL, ?, ?, ?)`,
        [visit.id, visit.guest_name, visit.visit_type, visit.purpose, visit.host_id, visit.host_name, visit.check_in_at, visit.expected_out_at, visit.created_at, visit.updated_at]
      );
    }
    visits = [visit, ...visits];
    tab = "onsite";
    closeModal();
    showNotice("Guest signed in.");
  } catch (e) { showError(e.message); }
}

async function checkOut(visitId) {
  const v = visits.find(x => x.id === visitId);
  if (!v || !canManageVisit(v)) return;
  const out = nowIso();
  try {
    if (DB) await db(`UPDATE app_guest_log__visits SET status = 'checked_out', check_out_at = ?, updated_at = ? WHERE id = ?`, [out, out, visitId]);
    visits = visits.map(x => x.id === visitId ? { ...x, status: "checked_out", check_out_at: out } : x);
    showNotice("Guest checked out.");
  } catch (e) { showError(e.message); }
}

async function deleteVisit(visitId) {
  const v = visits.find(x => x.id === visitId);
  if (!v || !canManageVisit(v)) return;
  const ok = await hubConfirm({ message: "Delete this log entry?", confirmLabel: "Delete", destructive: true });
  if (!ok) return;
  try {
    if (DB) await db(`DELETE FROM app_guest_log__visits WHERE id = ?`, [visitId]);
    visits = visits.filter(x => x.id !== visitId);
    approvals = approvals.filter(a => a.visit_id !== visitId);
    showNotice("Entry deleted.");
  } catch (e) { showError(e.message); }
}

// ── Overnight approvals (leadership only, via append endpoint) ───────────────────

async function decideOvernight(visitId, decision, note = "") {
  if (!isLeadership()) return showError("Only leadership can approve overnight stays.");
  try {
    if (DB) {
      await appendRecord("approvals", { visit_id: visitId, decision, note });
    }
    approvals = [...approvals, { id: uid("appr"), visit_id: visitId, decision, note, decided_by: ME.id, decided_at: nowIso() }];
    closeModal();
    showNotice(decision === "approved" ? "Overnight stay approved." : "Overnight stay denied.");
  } catch (e) { showError(e.message); }
}

window.openDenyModal = function (visitId) {
  openModal(`
    <h3>Deny overnight stay</h3>
    <form id="deny-form" data-visit="${esc(visitId)}">
      <div class="field">
        <label for="d-note">Reason <span style="text-transform:none;font-weight:600">(optional)</span></label>
        <textarea id="d-note" name="note" maxlength="1000" placeholder="Visible to the host" data-autofocus></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-danger">Deny stay</button>
      </div>
    </form>`);
};

// ── Modals ──────────────────────────────────────────────────────────────────────

function openModal(html) {
  closeModal();
  modalEl = document.createElement("div");
  modalEl.className = "modal-backdrop";
  modalEl.innerHTML = `<div class="modal">${html}</div>`;
  modalEl.addEventListener("click", (e) => { if (e.target === modalEl) closeModal(); });
  document.body.appendChild(modalEl);
  const first = modalEl.querySelector("[data-autofocus]");
  if (first) first.focus();
}
function closeModal() { modalEl?.remove(); modalEl = null; }
window.closeModal = closeModal;

window.openLogModal = function () {
  const typeOpts = VISIT_TYPES.map(t => `<option value="${esc(t.value)}">${esc(t.icon)} ${esc(t.label)}</option>`).join("");
  openModal(`
    <h3>Sign in a guest</h3>
    <form id="log-form">
      <div class="field">
        <label for="g-name">Guest name</label>
        <input id="g-name" name="guest_name" maxlength="120" placeholder="Who's visiting?" required data-autofocus />
      </div>
      <div class="field">
        <label for="g-type">Type</label>
        <select id="g-type" name="visit_type">${typeOpts}</select>
      </div>
      <div class="field" id="g-out-wrap" style="display:none">
        <label for="g-out">Expected departure</label>
        <input id="g-out" name="expected_out_at" type="date" />
        <span class="muted tiny">Overnight stays may need leadership approval.</span>
      </div>
      <div class="field">
        <label for="g-purpose">Purpose <span style="text-transform:none;font-weight:600">(optional)</span></label>
        <textarea id="g-purpose" name="purpose" maxlength="500" placeholder="Reason for the visit"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </div>
    </form>`);
  const sel = document.getElementById("g-type");
  const wrap = document.getElementById("g-out-wrap");
  sel.addEventListener("change", () => { wrap.style.display = sel.value === "overnight" ? "grid" : "none"; });
};

window.openSettingsModal = function () {
  const opts = groups.map(g => `<option value="${esc(g.id)}" ${settings.leadership_group_id === g.id ? "selected" : ""}>${esc(g.name)}</option>`).join("");
  const controls = IS_ADMIN ? `
    <div class="field">
      <label for="s-group">Leadership group</label>
      <select id="s-group">
        <option value="" ${!settings.leadership_group_id ? "selected" : ""}>— No leadership configured —</option>
        ${opts}
      </select>
      <span class="muted tiny">${!leadershipConfigured() ? "⚠️ Pick a leadership group to enable the full log view and overnight approvals — approvals are disabled until one is set." : "Members of this group see the full log and approve overnight stays."}</span>
    </div>` : `
    <p class="muted">Leadership group: <strong>${settings.leadership_group_id ? esc(groups.find(g => g.id === settings.leadership_group_id)?.name ?? settings.leadership_group_id) : "— none —"}</strong></p>
    <p class="tiny muted" style="margin-top:8px">Only a hub admin can change this.</p>`;
  openModal(`
    <h3>⚙️ Guest Log settings</h3>
    ${controls}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      ${IS_ADMIN ? `<button class="btn btn-primary" onclick="saveSettings()">Save</button>` : ""}
    </div>`);
};

window.saveSettings = async function () {
  const groupId = document.getElementById("s-group").value || null;
  const btn = modalEl?.querySelector(".modal-actions .btn-primary");
  if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
  try {
    await saveSetting("leadership_group_id", groupId ?? "");
    settings.leadership_group_id = groupId;
    closeModal();
    render();
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = "Save"; }
    showError(e.message);
  }
};

// ── Render ──────────────────────────────────────────────────────────────────────

function renderMessages() {
  return `${error ? `<div class="error">${esc(error)}</div>` : ""}${notice ? `<div class="notice">${esc(notice)}</div>` : ""}`;
}

function fmtWhen(iso) {
  if (!iso) return "";
  try {
    return new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }).format(new Date(iso));
  } catch { return iso; }
}

function approvalPill(visit) {
  if (visit.visit_type !== "overnight") return "";
  const s = approvalState(visit, approvals);
  if (s === "approved") return `<span class="pill good">Overnight ✓</span>`;
  if (s === "denied") return `<span class="pill bad">Overnight denied</span>`;
  return `<span class="pill warn">Overnight — pending</span>`;
}

function renderVisit(visit) {
  const meta = visitTypeMeta(visit.visit_type);
  const host = memberMap.get(visit.host_id);
  const onsite = isOnSite(visit);
  const manage = canManageVisit(visit);
  const showApproval = visit.visit_type === "overnight" && isLeadership() && approvalState(visit, approvals) === "pending" && onsite;

  const actions = [];
  if (showApproval) {
    actions.push(`<button class="btn btn-good btn-sm" data-approve="${esc(visit.id)}">Approve overnight</button>`);
    actions.push(`<button class="btn btn-danger btn-sm" data-deny="${esc(visit.id)}">Deny</button>`);
  }
  if (onsite && manage) actions.push(`<button class="btn btn-ghost btn-sm" data-checkout="${esc(visit.id)}">Check out</button>`);
  if (manage) actions.push(`<button class="btn btn-ghost btn-sm" data-delete="${esc(visit.id)}">Delete</button>`);

  return `
    <article class="card">
      <div class="visit-head">
        <div class="row" style="align-items:flex-start;gap:10px">
          <span style="font-size:1.3rem">${esc(meta.icon)}</span>
          <div>
            <div class="guest-name">${esc(visit.guest_name || "Guest")}</div>
            <div class="visit-meta">
              Host: ${esc(host?.name ?? visit.host_name ?? "—")} · In ${esc(fmtWhen(visit.check_in_at))}
              ${visit.check_out_at ? ` · Out ${esc(fmtWhen(visit.check_out_at))}` : ""}
              ${visit.expected_out_at ? ` · Expected ${esc(visit.expected_out_at)}` : ""}
            </div>
            ${visit.purpose ? `<div class="visit-meta">${esc(visit.purpose)}</div>` : ""}
          </div>
        </div>
        <div class="row" style="justify-content:flex-end">
          ${onsite ? `<span class="pill info">On site</span>` : `<span class="pill">Checked out</span>`}
          ${approvalPill(visit)}
        </div>
      </div>
      ${actions.length ? `<div class="actions">${actions.join("")}</div>` : ""}
    </article>`;
}

function render() {
  const root = document.getElementById("root");
  root.className = "app";

  const onsite = visits.filter(isOnSite);
  const history = visits.filter(v => !isOnSite(v));
  const pending = visits.filter(v => v.visit_type === "overnight" && isOnSite(v) && approvalState(v, approvals) === "pending");
  const list = tab === "onsite" ? onsite : tab === "history" ? history : pending;

  const scopeNote = isLeadership()
    ? `Showing the full house log.`
    : `Showing guests you've signed in.`;

  const leadershipNotConfigured = !leadershipConfigured()
    ? `<div class="notice">No leadership group is configured, so overnight approvals are disabled and no one has the full-log view. ${IS_ADMIN ? `Use <strong>Settings</strong> to pick one.` : `Ask a hub admin to set one in Settings.`}</div>`
    : "";

  root.innerHTML = `
    <div class="topbar">
      <div>
        <h1>📖 Guest Log</h1>
        <p class="muted tiny">${esc(scopeNote)}</p>
      </div>
      <div class="row" style="justify-content:flex-end">
        <button class="btn" onclick="openLogModal()">Sign in guest</button>
        <button class="btn btn-ghost btn-sm" onclick="openSettingsModal()">Settings</button>
      </div>
    </div>
    ${renderMessages()}
    ${leadershipNotConfigured}
    <div class="tabs">
      <button class="tab ${tab === "onsite" ? "active" : ""}" data-tab="onsite">On site (${onsite.length})</button>
      ${isLeadership() ? `<button class="tab ${tab === "pending" ? "active" : ""}" data-tab="pending">Overnight (${pending.length})</button>` : ""}
      <button class="tab ${tab === "history" ? "active" : ""}" data-tab="history">History (${history.length})</button>
    </div>
    <div class="section-head">
      <h2>${tab === "onsite" ? "Currently on site" : tab === "pending" ? "Overnight — awaiting approval" : "Past visits"}</h2>
      <button class="btn btn-ghost btn-sm" data-refresh>Refresh</button>
    </div>
    <section class="stack">
      ${list.length ? list.map(renderVisit).join("") : `<div class="card empty">Nothing here yet.</div>`}
    </section>`;
}

// ── Events ───────────────────────────────────────────────────────────────────────

document.addEventListener("click", (e) => {
  const t = e.target.closest("button");
  if (!t) return;
  if (t.hasAttribute("data-tab")) { tab = t.getAttribute("data-tab"); clearMessages(); render(); return; }
  if (t.matches("[data-refresh]")) return refresh();
  if (t.hasAttribute("data-checkout")) return checkOut(t.getAttribute("data-checkout"));
  if (t.hasAttribute("data-delete")) return deleteVisit(t.getAttribute("data-delete"));
  if (t.hasAttribute("data-approve")) return decideOvernight(t.getAttribute("data-approve"), "approved");
  if (t.hasAttribute("data-deny")) return window.openDenyModal(t.getAttribute("data-deny"));
});

document.addEventListener("submit", (e) => {
  const form = e.target;
  if (form.id === "log-form") {
    e.preventDefault();
    const btn = form.querySelector(".btn-primary");
    if (btn) { btn.disabled = true; btn.textContent = "Signing in…"; }
    submitVisitForm(form).catch((err) => { if (btn) { btn.disabled = false; btn.textContent = "Sign in"; } showError(err.message); });
    return;
  }
  if (form.id === "deny-form") {
    e.preventDefault();
    const btn = form.querySelector(".btn-danger");
    if (btn) { btn.disabled = true; btn.textContent = "Denying…"; }
    decideOvernight(form.getAttribute("data-visit"), "denied", form.note.value.trim())
      .catch((err) => { if (btn) { btn.disabled = false; btn.textContent = "Deny stay"; } showError(err.message); });
    return;
  }
});

refresh();
</script>
</body>
</html>
